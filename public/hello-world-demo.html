<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>undo-manager-jit-tail - Hello World demo</title>
</head>
<body>

  <h1>undo-manager-jit-tail - Hello World demo</h1>

  <p>Value: <span id="value">0</span></p>

  <button id="increment">Increment</button>
  <button id="undo">Undo</button>
  <button id="redo">Redo</button>

  <script type="module">
    const {
      initHist,
      executeHist,
      undoHist,
      redoHist
    } = await import("https://esm.sh/@dominic.mayers/undo-manager-jit-tail");

    let value = 0;
    const valueEl = document.getElementById("value");

    function render() {
      valueEl.textContent = String(value);
      console.log("value =", value);
    }

    function setValue(next) {
      value = next;
      render();
    }

    initHist();
    render();

    document.getElementById("increment").onclick = () => {
      const before = value;
      const after = value + 1;

      executeHist(
        () => setValue(before),
        () => setValue(after)
      )?.();
    };

    document.getElementById("undo").onclick = () => {
      undoHist()?.();
    };

    document.getElementById("redo").onclick = () => {
      redoHist()?.();
    };
  </script>

</body>
</html>
